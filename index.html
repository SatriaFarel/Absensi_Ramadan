<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Absensi Tadarus</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen p-4 sm:p-6">

  <div class="max-w-7xl mx-auto space-y-8">

    <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8 text-center border">

      <h1 class="text-2xl sm:text-3xl font-bold text-slate-800">
        ABSENSI TADARUS AL-QUR'AN RAMADHAN 1447 H
      </h1>

      <p class="text-slate-600 text-base sm:text-lg mt-2">
        Masjid Anwarul Hidayah
      </p>

      <p id="tanggalSekarang" class="text-sm text-slate-500 mt-2"></p>

    </div>


    <div class="bg-white rounded-2xl shadow-md p-4 sm:p-6 flex flex-wrap gap-4 items-center justify-between">

      <div class="flex gap-3 flex-wrap">

        <input id="namaInput" type="text" placeholder="Masukkan Nama Peserta..."
          class="border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 px-4 py-2 rounded-lg w-60 sm:w-64 outline-none"
          onkeypress="if(event.key==='Enter') tambahPeserta()" />

        <button onclick="tambahPeserta()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg">
          Tambah
        </button>

        <input id="searchInput" type="text" placeholder="Cari peserta..."
          class="border border-slate-300 px-4 py-2 rounded-lg w-60 sm:w-64 outline-none" oninput="render()" />

      </div>


      <div class="flex gap-3 flex-wrap">

        <button onclick="semuaHadirHariIni()" class="bg-green-600 text-white px-4 py-2 rounded-lg">
          Semua Hadir Hari Ini
        </button>

        <button onclick="resetHariIni()" class="bg-gray-600 text-white px-4 py-2 rounded-lg">
          Reset Hari Ini
        </button>

        <button onclick="exportJSON()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg">
          Export JSON
        </button>

        <button onclick="exportPDF()" class="bg-rose-600 text-white px-4 py-2 rounded-lg">
          Export PDF
        </button>

        <label class="bg-amber-500 text-white px-4 py-2 rounded-lg cursor-pointer">
          Import JSON
          <input type="file" hidden onchange="importJSON(event)">
        </label>

      </div>

    </div>


    <div class="bg-white rounded-2xl shadow-md p-6">

      <h2 class="text-lg font-semibold text-slate-700 mb-4">
        Grafik Kehadiran Per Hari
      </h2>

      <div class="w-full overflow-x-auto">
        <canvas id="chartKehadiran" height="100"></canvas>
      </div>

    </div>


    <div class="bg-white rounded-2xl shadow-md p-4 sm:p-6">

      <div class="w-full overflow-x-auto">

        <table class="border-collapse text-[10px] sm:text-xs w-max min-w-full">

          <thead>
            <tr id="headerRow" class="bg-indigo-700 text-white">

              <th class="border px-2 py-2">No</th>
              <th class="border px-2 py-2">Nama</th>
              <th class="border px-2 py-2">Aksi</th>

            </tr>
          </thead>

          <tbody id="tbody"></tbody>

        </table>

      </div>

    </div>

    <!-- AKUMULASI -->

    <div class="bg-white rounded-2xl shadow-md p-6">

      <h2 class="text-lg font-semibold text-slate-700 mb-4">
        Akumulasi Kehadiran Peserta
      </h2>

      <div class="overflow-x-auto">

        <table class="border-collapse text-xs w-full">

          <thead class="bg-slate-700 text-white">

            <tr>
              <th class="border px-3 py-2">No</th>
              <th class="border px-3 py-2">Nama</th>
              <th class="border px-3 py-2">Total Hadir</th>
              <th class="border px-3 py-2">Persentase</th>
            </tr>

          </thead>

          <tbody id="rekapBody"></tbody>

        </table>

      </div>


    </div>

    <script>

      const STORAGE_KEY = "absensi_tadarus_ramadhan"
      const HIJRI_CACHE_KEY = "hijri_cache_today"

      let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []
      let chartInstance = null
      let hariHijriah = 0


      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data))
      }

      function getHariSekarang() {

        if (hariHijriah <= 0) return 0
        if (hariHijriah > 30) return 29

        return hariHijriah - 1

      }

      function semuaHadirHariIni() {

        const hari = getHariSekarang()

        data.forEach(p => {
          p.hadir[hari] = true
        })

        save()
        render()

      }


      function resetHariIni() {

        const hari = getHariSekarang()

        if (!confirm("Reset presensi hari ini?")) return

        data.forEach(p => {
          p.hadir[hari] = false
        })

        save()
        render()

      }

      function updateChart() {

        const jumlahPerHari = Array(30).fill(0)

        data.forEach(p => {
          p.hadir.forEach((v, i) => {
            if (v) jumlahPerHari[i]++
          })
        })

        const ctx = document.getElementById("chartKehadiran")

        if (chartInstance) chartInstance.destroy()

        chartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: Array.from({ length: 30 }, (_, i) => `Hari ${i + 1}`),
            datasets: [{
              label: "Jumlah Hadir",
              data: jumlahPerHari
            }]
          },
          options: {
            responsive: true,
            scales: {
              y: {
                beginAtZero: true,
                ticks: { precision: 0 }
              }
            }
          }
        })

      }



      async function tampilkanTanggal() {

        const el = document.getElementById("tanggalSekarang")
        const now = new Date()

        const masehi = now.toLocaleDateString("id-ID", {
          weekday: "long",
          day: "numeric",
          month: "long",
          year: "numeric"
        })

        const todayKey = now.toISOString().split("T")[0]

        const cache = JSON.parse(localStorage.getItem(HIJRI_CACHE_KEY))

        if (cache && cache.date === todayKey) {

          el.textContent = `${masehi} | ${cache.hijri}`

          const day = parseInt(cache.hijri)
          if (!isNaN(day)) hariHijriah = day

          return
        }

        el.textContent = `Memuat hijriah... | ${masehi}`

        try {

          const url = `https://api.aladhan.com/v1/gToH?date=${now.getDate()}-${now.getMonth() + 1}-${now.getFullYear()}`
          const res = await fetch(url)
          const json = await res.json()

          if (json.code === 200) {

            const h = json.data.hijri

            hariHijriah = parseInt(h.day)

            const hijriText = `${h.day} ${h.month.en} ${h.year} H`

            el.textContent = `${masehi} | ${hijriText}`

            localStorage.setItem(HIJRI_CACHE_KEY, JSON.stringify({
              date: todayKey,
              hijri: h.day
            }))

          }

        } catch {

          el.textContent = `${masehi} | Hijriah gagal dimuat`

        }

      }


      function generateHeader() {

        const headerRow = document.getElementById("headerRow")

        if (headerRow.children.length === 3) {

          for (let i = 1; i <= 30; i++) {

            const th = document.createElement("th")
            th.className = "border px-1 py-2"
            th.textContent = i
            headerRow.appendChild(th)

          }

        }

      }



      function render() {

        generateHeader()

        const tbody = document.getElementById("tbody")
        tbody.innerHTML = ""

        const keyword = document.getElementById("searchInput")?.value?.toLowerCase() || ""

        data.forEach((item, index) => {

          if (keyword && !item.nama.toLowerCase().includes(keyword)) return

          const tr = document.createElement("tr")
          tr.className = "hover:bg-slate-50"

          tr.innerHTML = `

<td class="border text-center">${index + 1}</td>

<td class="border px-2">

<input value="${item.nama}"
class="w-full bg-transparent outline-none"
onchange="editNama(${index},this.value)">

</td>

<td class="border text-center">

<button onclick="hapusPeserta(${index})"
class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-xs">

Hapus

</button>

</td>
`

          item.hadir.forEach((val, hariIndex) => {

            const td = document.createElement("td")
            td.className = "border text-center"

            const cb = document.createElement("input")
            cb.type = "checkbox"
            cb.checked = val
            cb.className = "accent-indigo-600 w-5 h-5"

            cb.addEventListener("change", () => {

              data[index].hadir[hariIndex] = cb.checked
              save()
              updateChart()

            })

            td.appendChild(cb)
            tr.appendChild(td)

          })

          tbody.appendChild(tr)

        })

        updateChart()

      }

      /* ================= REKAP ================= */
      function renderRekap() {

        const body = document.getElementById("rekapBody")
        body.innerHTML = ""
        data.forEach((p, i) => {

          const total = p.hadir.filter(v => v).length
          const persen = ((total / 30) * 100).toFixed(0)

          const tr = document.createElement("tr")

          tr.innerHTML = `
<td class="border px-2 py-1 text-center">${i + 1}</td>
<td class="border px-2 py-1">${p.nama}</td>
<td class="border px-2 py-1 text-center">${total}</td>
<td class="border px-2 py-1 text-center">${persen}%</td>
`

          body.appendChild(tr)

        })

      }

      function tambahPeserta() {

        const input = document.getElementById("namaInput")
        const nama = input.value.trim()

        if (!nama) return

        data.push({
          nama: nama,
          hadir: Array(30).fill(false)
        })

        input.value = ""
        save()
        render()

      }

      function editNama(i, v) {
        data[i].nama = v.trim()
        save()
      }

      function hapusPeserta(i) {

        if (!confirm("Yakin mau hapus peserta ini?")) return

        data.splice(i, 1)
        save()
        render()

      }

      function exportJSON() {

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" })
        const a = document.createElement("a")

        a.href = URL.createObjectURL(blob)
        a.download = "absensi_tadarus.json"
        a.click()

      }



      function importJSON(e) {

        const file = e.target.files[0]
        if (!file) return

        const reader = new FileReader()

        reader.onload = function (evt) {

          try {

            const imported = JSON.parse(evt.target.result)

            if (!Array.isArray(imported)) throw "Format salah"

            imported.forEach(p => {
              if (!Array.isArray(p.hadir) || p.hadir.length !== 30) {
                throw "Data tidak valid"
              }
            })

            data = imported
            save()
            render()

          } catch {
            alert("File JSON tidak valid")
          }

        }

        reader.readAsText(file)

      }



      /* ================= PDF ================= */

      function exportPDF() {

        const { jsPDF } = window.jspdf
        const doc = new jsPDF("landscape")

        const now = new Date().toLocaleDateString("id-ID")

        /* ================= PAGE 1 ================= */

        doc.setFontSize(20)
        doc.setFont(undefined, "bold")
        doc.text("ABSENSI TADARUS RAMADHAN 1447 H", 148, 12, { align: "center" })

        doc.setFontSize(14)
        doc.setFont(undefined, "normal")
        doc.text("Masjid Anwarul Hidayah", 148, 18, { align: "center" })

        doc.setFontSize(11)
        doc.text(`Tanggal Cetak: ${now}`, 14, 18)

        const headers1 = ["No", "Nama"]
        for (let i = 1; i <= 15; i++) headers1.push(i.toString())

        const rows1 = data.map((item, index) => [
          index + 1,
          item.nama,
          ...item.hadir.slice(0, 15).map(h => h ? "O" : "")
        ])

        doc.autoTable({
          startY: 26,
          head: [headers1],
          body: rows1,
          theme: "grid",
          styles: {
            fontSize: 13,
            cellPadding: 3
          },
          headStyles: {
            fillColor: [60, 60, 60],
            textColor: 255,
            fontStyle: "bold",
            halign: "center",
            fontSize: 13
          },
          bodyStyles: {
            halign: "center"
          },
          columnStyles: {
            0: { cellWidth: 12 },
            1: { cellWidth: 50, halign: "left" }
          }
        })


        /* ================= PAGE 2 ================= */

        doc.addPage()

        doc.setFontSize(20)
        doc.setFont(undefined, "bold")
        doc.text("ABSENSI TADARUS RAMADHAN 1447 H", 148, 12, { align: "center" })

        doc.setFontSize(14)
        doc.setFont(undefined, "normal")
        doc.text("Masjid Anwarul Hidayah", 148, 18, { align: "center" })

        doc.setFontSize(11)
        doc.text(`Tanggal Cetak: ${now}`, 14, 18)

        const headers2 = ["No", "Nama"]
        for (let i = 16; i <= 30; i++) headers2.push(i.toString())

        const rows2 = data.map((item, index) => [
          index + 1,
          item.nama,
          ...item.hadir.slice(15, 30).map(h => h ? "O" : "")
        ])

        doc.autoTable({
          startY: 26,
          head: [headers2],
          body: rows2,
          theme: "grid",
          styles: {
            fontSize: 13,
            cellPadding: 3
          },
          headStyles: {
            fillColor: [60, 60, 60],
            textColor: 255,
            fontStyle: "bold",
            halign: "center",
            fontSize: 13
          },
          bodyStyles: {
            halign: "center"
          },
          columnStyles: {
            0: { cellWidth: 12 },
            1: { cellWidth: 50, halign: "left" }
          }
        })


        /* ================= PAGE 3 REKAP ================= */

        doc.addPage()

        doc.setFontSize(20)
        doc.setFont(undefined, "bold")
        doc.text("REKAP KEHADIRAN PESERTA", 148, 12, { align: "center" })

        doc.setFontSize(14)
        doc.setFont(undefined, "normal")
        doc.text("Masjid Anwarul Hidayah", 148, 18, { align: "center" })

        doc.setFontSize(11)
        doc.text(`Tanggal Cetak: ${now}`, 14, 18)

        const headersRekap = ["No", "Nama", "Total Hadir", "Persentase"]

        const rowsRekap = data.map((p, i) => {

          const total = p.hadir.filter(v => v).length
          const persen = ((total / 30) * 100).toFixed(0) + "%"

          return [
            i + 1,
            p.nama,
            total,
            persen
          ]

        })

        doc.autoTable({
          startY: 26,
          head: [headersRekap],
          body: rowsRekap,
          theme: "grid",
          styles: {
            fontSize: 14,
            cellPadding: 4
          },
          headStyles: {
            fillColor: [40, 40, 40],
            textColor: 255,
            fontStyle: "bold",
            halign: "center"
          },
          bodyStyles: {
            halign: "center"
          },
          columnStyles: {
            0: { cellWidth: 20 },
            1: { cellWidth: 100, halign: "left" },
            2: { cellWidth: 40 },
            3: { cellWidth: 40 }
          }
        })

        doc.save("absensi_tadarus.pdf")

      }
      tampilkanTanggal()
      render()
      renderRekap()

    </script>

</body>

</html>
